<!--
  AuditOS Right Context Panel Component
  Application Shell — Chapter 114 / Layout Components — Chapter 75

  Reusable structural context panel mounted inside the shell's panel
  region: <aside class="aos-panel" aria-label="Context panel">.
  Structure only — five empty regions that later issues populate with
  supporting information, relationships, activity, and controls.

  No component loader or build step exists in the prototype yet, so this
  markup is also embedded directly inside index.html. This file is the
  canonical source for that markup; keep the two in sync.
-->
<div class="aos-context-panel">
  <!-- Panel header region — reserved for the panel title / close and collapse controls -->
  <div class="aos-context-panel__header" data-region="panel-header"></div>

  <!-- Primary content region — reserved for the primary contextual information -->
  <div class="aos-context-panel__primary" data-region="primary-content"></div>

  <!-- Secondary content region — reserved for supporting contextual information -->
  <div class="aos-context-panel__secondary" data-region="secondary-content"></div>

  <!-- Footer region — reserved for the persistent panel footer / status area -->
  <div class="aos-context-panel__footer" data-region="footer"></div>

  <!-- Collapse placeholder region — reserved for the future collapse / expand control -->
  <div class="aos-context-panel__collapse" data-region="collapse"></div>
</div>
