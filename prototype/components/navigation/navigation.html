<!--
  AuditOS Breadcrumb Navigation Component
  Navigation Components — Chapter 76 (§76.10 Breadcrumbs) / Application Shell
  optimization (GitHub Issue #16)

  Breadcrumb navigation mounted inside the global header's breadcrumb region:
  <nav class="aos-global-header__breadcrumb" aria-label="Breadcrumb">.
  The trail is rendered at runtime by navigation.js: the workspace crumb
  names the active workspace and doubles as the workspace switcher — a menu
  of every registered workspace, driven by the Workspace Registry and the
  Static Router. Future issues append deeper crumbs (client / engagement /
  business object) as additional trail items.

  No component loader or build step exists in the prototype, so this file is
  the canonical source for the markup navigation.js renders; keep the two in
  sync.
-->
<ol class="aos-breadcrumb" role="list">
  <li class="aos-breadcrumb__item">
    <!-- Separator between the brand and the trail -->
    <span class="aos-breadcrumb__separator" aria-hidden="true">/</span>

    <!-- Workspace crumb — the workspace switcher (menu button pattern) -->
    <button type="button" class="aos-breadcrumb__crumb" aria-haspopup="menu"
      aria-expanded="false" aria-label="Current workspace: AuditOS Home — switch workspace">
      <span class="aos-breadcrumb__crumb-label">AuditOS Home</span>
      <span class="aos-breadcrumb__chevron" aria-hidden="true"><i class="bi bi-chevron-down"></i></span>
    </button>

    <!-- Workspace menu — one destination per registered workspace, in registry order -->
    <ul class="aos-breadcrumb__menu" role="menu" aria-label="Workspaces" hidden>
      <li role="none">
        <a class="aos-breadcrumb__option is-active" role="menuitem" href="#/dashboard"
          data-workspace-id="dashboard" aria-current="page">
          <span class="aos-breadcrumb__option-label">AuditOS Home</span>
          <span class="aos-breadcrumb__option-check" aria-hidden="true">✓</span>
        </a>
      </li>
      <li role="none">
        <a class="aos-breadcrumb__option" role="menuitem" href="#/engagements" data-workspace-id="engagement">
          <span class="aos-breadcrumb__option-label">Engagement</span>
          <span class="aos-breadcrumb__option-check" aria-hidden="true"></span>
        </a>
      </li>
      <!-- …one option per remaining registered workspace… -->
    </ul>
  </li>
</ol>
