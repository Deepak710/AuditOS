<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditOS</title>
  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <a href="#workspace-canvas" class="aos-skip-link">Skip to main content</a>

  <div class="aos-shell">
    <header class="aos-header" aria-label="Global header">
      <!-- ========================================================= -->
      <!-- Global Header Component                                   -->
      <!-- The single navigation and identity surface of the shell   -->
      <!-- (Issue #16). The brand is static product identity; the    -->
      <!-- breadcrumb region is populated by                         -->
      <!-- components/navigation/navigation.js from the Workspace    -->
      <!-- Registry, and the global actions / profile regions by     -->
      <!-- components/header/header.js from the Shared Audit State.  -->
      <!-- ========================================================= -->
      <div class="aos-global-header">
        <div class="aos-global-header__start">
          <!-- Brand — the AuditOS mark / wordmark, linking to Home -->
          <a class="aos-global-header__brand" data-region="brand" href="#/dashboard">
            <span class="aos-global-header__brand-mark" aria-hidden="true">A</span>
            <span class="aos-global-header__brand-name">AuditOS</span>
          </a>

          <!-- Breadcrumb navigation — the workspace crumb opens the workspace switcher menu -->
          <nav class="aos-global-header__breadcrumb" data-region="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>

        <div class="aos-global-header__end">
          <!-- Global actions region — theme toggle and notifications (header.js); search / command palette / AI status arrive with later issues -->
          <div class="aos-global-header__actions" data-region="global-actions"></div>

          <!-- User profile region — the signed-in user control (header.js) -->
          <div class="aos-global-header__profile" data-region="user-profile"></div>
        </div>
      </div>
    </header>

    <main class="aos-workspace" aria-label="Workspace">
      <!-- ========================================================= -->
      <!-- Workspace Host Component                                  -->
      <!-- Canonical source: components/workspace/workspace-host.html -->
      <!-- Structure only — header, body, footer, plus empty and     -->
      <!-- loading state placeholders for later issues.              -->
      <!-- ========================================================= -->
      <div class="aos-workspace-host">
        <!-- Workspace header region — reserved for breadcrumbs, page title, workspace toolbar, and workspace actions -->
        <div class="aos-workspace-host__header" data-region="workspace-header"></div>

        <!-- Workspace body region — primary operational canvas that hosts the active workspace; scrolls independently -->
        <div id="workspace-canvas" class="aos-workspace-host__body" data-region="workspace-body">
          <!-- Empty state placeholder — reserved for the workspace empty state (explanation, primary action, guidance) -->
          <div class="aos-workspace-host__empty" data-region="empty-placeholder"></div>

          <!-- Loading state placeholder — reserved for the workspace loading skeleton -->
          <div class="aos-workspace-host__loading" data-region="loading-placeholder"></div>
        </div>

        <!-- Workspace footer region — reserved for the persistent workspace footer / status bar -->
        <div class="aos-workspace-host__footer" data-region="workspace-footer"></div>
      </div>
    </main>
  </div>

  <!-- ========================================================= -->
  <!-- Static Routing Foundation                                 -->
  <!-- Classic scripts (no build step / module loader) so the    -->
  <!-- prototype runs directly from file://. Order matters:      -->
  <!-- registry, then router engine.                             -->
  <!-- ========================================================= -->
  <script src="js/router/workspace-registry.js"></script>
  <script src="js/router/router.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Audit State Foundation                             -->
  <!-- Runtime state layer: generated demo-data bundle, then the -->
  <!-- structural catalog, then the state store. The bundle is a -->
  <!-- generated projection of demo-data JSON so loading behaves -->
  <!-- identically under file:// and http(s), fully offline.     -->
  <!-- Loads before the bootstrap so main.js can initialize the  -->
  <!-- state alongside the router.                               -->
  <!-- ========================================================= -->
  <script src="demo-data/demo-data.js"></script>
  <script src="js/state/demo-data-registry.js"></script>
  <script src="js/state/state-store.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Enterprise Component Library                       -->
  <!-- The authoritative catalog of reusable presentation        -->
  <!-- components (window.AuditOS.componentLibrary). A pure,     -->
  <!-- side-effect-free registry; the components themselves are  -->
  <!-- CSS defined in css/components.css. No workspace may        -->
  <!-- invent duplicate UI primitives.                           -->
  <!-- ========================================================= -->
  <script src="components/component-library/component-library.js"></script>

  <!-- ========================================================= -->
  <!-- Enterprise Data Presentation System (Issue #18)          -->
  <!-- The shared, configuration-driven renderer                 -->
  <!-- (window.AuditOS.presentation) that turns JSON             -->
  <!-- configuration into DOM by composing the component         -->
  <!-- primitives above: data grid, master-detail, inspector,    -->
  <!-- timeline, activity feed, entity cards, status system,     -->
  <!-- metadata, and list views. Presentation only — it reads    -->
  <!-- no state and holds no business logic; workspaces map the  -->
  <!-- Shared Audit State into its configuration.                -->
  <!-- ========================================================= -->
  <script src="components/presentation/presentation.js"></script>

  <!-- ========================================================= -->
  <!-- Application Bootstrap                                     -->
  <!-- Starts the Shared Audit State and the router once the     -->
  <!-- shell markup is ready.                                    -->
  <!-- ========================================================= -->
  <script src="js/main.js"></script>

  <!-- ========================================================= -->
  <!-- Breadcrumb Navigation Content                             -->
  <!-- Renders the header breadcrumb and its workspace switcher  -->
  <!-- menu from the registry and follows the current route.     -->
  <!-- Loads after the bootstrap so the router has resolved the  -->
  <!-- initial route first.                                      -->
  <!-- ========================================================= -->
  <script src="components/navigation/navigation.js"></script>

  <!-- ========================================================= -->
  <!-- Global Header Content                                     -->
  <!-- Renders the theme toggle, the notification indicator, and -->
  <!-- the signed-in user control into the header's global       -->
  <!-- actions and profile regions. Business values derive from  -->
  <!-- the Shared Audit State; the theme preference is memory-   -->
  <!-- only presentation state.                                  -->
  <!-- ========================================================= -->
  <script src="components/header/header.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Workspace Framework                                -->
  <!-- Renders the Universal Workspace Structure into the active -->
  <!-- workspace host on every route change, so every workspace  -->
  <!-- inherits the same internal skeleton. Loads after the      -->
  <!-- bootstrap so the initial route is resolved first.         -->
  <!-- ========================================================= -->
  <script src="components/workspace-framework/workspace-framework.js"></script>

  <!-- ========================================================= -->
  <!-- AuditOS Home Workspace                                    -->
  <!-- The operating-system landing experience. Collects a       -->
  <!-- declarative view model from the Shared Audit State and    -->
  <!-- assembles the resume, urgent, assigned, pulse, portfolio, -->
  <!-- and signal sections from reusable components into the     -->
  <!-- framework's reserved slots. Loads after the framework so  -->
  <!-- the skeleton exists before Home fills it.                 -->
  <!-- ========================================================= -->
  <script src="js/workspaces/home.js"></script>
</body>
</html>
