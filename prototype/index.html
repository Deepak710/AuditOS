<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditOS</title>
  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <a href="#workspace-canvas" class="aos-skip-link">Skip to main content</a>

  <div class="aos-shell">
    <header class="aos-header" aria-label="Global header">
      <!-- ========================================================= -->
      <!-- Global Header Component                                   -->
      <!-- The single navigation and identity surface of the shell   -->
      <!-- (Issue #16). The brand is static product identity; the    -->
      <!-- breadcrumb region is populated by                         -->
      <!-- components/navigation/navigation.js from the Workspace    -->
      <!-- Registry, and the global actions / profile regions by     -->
      <!-- components/header/header.js from the Shared Audit State.  -->
      <!-- ========================================================= -->
      <div class="aos-global-header">
        <div class="aos-global-header__start">
          <!-- Brand — the AuditOS mark / wordmark, linking to Home -->
          <a class="aos-global-header__brand" data-region="brand" href="#/dashboard">
            <span class="aos-global-header__brand-mark" aria-hidden="true">A</span>
            <span class="aos-global-header__brand-name">AuditOS</span>
          </a>

          <!-- Breadcrumb navigation — the workspace crumb opens the workspace switcher menu -->
          <nav class="aos-global-header__breadcrumb" data-region="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>

        <div class="aos-global-header__end">
          <!-- Global actions region — theme toggle and notifications (header.js); search / command palette / AI status arrive with later issues -->
          <div class="aos-global-header__actions" data-region="global-actions"></div>

          <!-- User profile region — the signed-in user control (header.js) -->
          <div class="aos-global-header__profile" data-region="user-profile"></div>
        </div>
      </div>
    </header>

    <main class="aos-workspace" aria-label="Workspace">
      <!-- ========================================================= -->
      <!-- Workspace Host Component                                  -->
      <!-- Canonical source: components/workspace/workspace-host.html -->
      <!-- Structure only — header, body, footer, plus empty and     -->
      <!-- loading state placeholders for later issues.              -->
      <!-- ========================================================= -->
      <div class="aos-workspace-host">
        <!-- Workspace header region — reserved for breadcrumbs, page title, workspace toolbar, and workspace actions -->
        <div class="aos-workspace-host__header" data-region="workspace-header"></div>

        <!-- Workspace body region — primary operational canvas that hosts the active workspace; scrolls independently -->
        <div id="workspace-canvas" class="aos-workspace-host__body" data-region="workspace-body">
          <!-- Empty state placeholder — reserved for the workspace empty state (explanation, primary action, guidance) -->
          <div class="aos-workspace-host__empty" data-region="empty-placeholder"></div>

          <!-- Loading state placeholder — reserved for the workspace loading skeleton -->
          <div class="aos-workspace-host__loading" data-region="loading-placeholder"></div>
        </div>

        <!-- Workspace footer region — reserved for the persistent workspace footer / status bar -->
        <div class="aos-workspace-host__footer" data-region="workspace-footer"></div>
      </div>
    </main>
  </div>

  <!-- ========================================================= -->
  <!-- Static Routing Foundation                                 -->
  <!-- Classic scripts (no build step / module loader) so the    -->
  <!-- prototype runs directly from file://. Order matters:      -->
  <!-- registry, then router engine.                             -->
  <!-- ========================================================= -->
  <script src="js/router/workspace-registry.js"></script>
  <script src="js/router/router.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Audit State Foundation                             -->
  <!-- Runtime state layer: generated demo-data bundle, then the -->
  <!-- structural catalog, then the state store. The bundle is a -->
  <!-- generated projection of demo-data JSON so loading behaves -->
  <!-- identically under file:// and http(s), fully offline.     -->
  <!-- Loads before the bootstrap so main.js can initialize the  -->
  <!-- state alongside the router.                               -->
  <!-- ========================================================= -->
  <script src="demo-data/demo-data.js"></script>
  <script src="js/state/demo-data-registry.js"></script>
  <script src="js/state/state-store.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Enterprise Component Library                       -->
  <!-- The authoritative catalog of reusable presentation        -->
  <!-- components (window.AuditOS.componentLibrary). A pure,     -->
  <!-- side-effect-free registry; the components themselves are  -->
  <!-- CSS defined in css/components.css. No workspace may        -->
  <!-- invent duplicate UI primitives.                           -->
  <!-- ========================================================= -->
  <script src="components/component-library/component-library.js"></script>

  <!-- ========================================================= -->
  <!-- Enterprise Data Presentation System (Issue #18)          -->
  <!-- The shared, configuration-driven renderer                 -->
  <!-- (window.AuditOS.presentation) that turns JSON             -->
  <!-- configuration into DOM by composing the component         -->
  <!-- primitives above: data grid, master-detail, inspector,    -->
  <!-- timeline, activity feed, entity cards, status system,     -->
  <!-- metadata, and list views. Presentation only — it reads    -->
  <!-- no state and holds no business logic; workspaces map the  -->
  <!-- Shared Audit State into its configuration.                -->
  <!-- ========================================================= -->
  <script src="components/presentation/presentation.js"></script>

  <!-- ========================================================= -->
  <!-- Cross-Workspace Relationship Engine (Issue #30)          -->
  <!-- The shared, read-only relationship/derivation layer       -->
  <!-- (window.AuditOS.relationships): control reference          -->
  <!-- resolution, activity-history normalization, collection    -->
  <!-- metadata, and graph traversal helpers extracted from the  -->
  <!-- operational workspaces. Depends on nothing in components/ -->
  <!-- so the existing js → components boundary stays one-way.  -->
  <!-- Loads before every workspace module.                      -->
  <!-- ========================================================= -->
  <script src="js/platform/relationships.js"></script>

  <!-- ========================================================= -->
  <!-- Permission Foundation (Issue #33)                        -->
  <!-- The static, platform-wide capability descriptor           -->
  <!-- (window.AuditOS.permissions): which roles hold which      -->
  <!-- gated capabilities, the static demo session, and the      -->
  <!-- pure can / explainDenial reads behind the permission-     -->
  <!-- aware action pattern (§5). Not an authorization engine —  -->
  <!-- Release 1 has no authentication. Depends on nothing in    -->
  <!-- components/, keeping the js → components boundary         -->
  <!-- one-way. Loads before the navigation content and every    -->
  <!-- workspace module that gates on it.                        -->
  <!-- ========================================================= -->
  <script src="js/platform/permissions.js"></script>

  <!-- ========================================================= -->
  <!-- Platform Audit Service (Issue #34)                       -->
  <!-- The platform-wide immutable audit trail                   -->
  <!-- (window.AuditOS.auditService): every significant action   -->
  <!-- records one event with the full schema (user, role,       -->
  <!-- session, entity, previous/new value, reason, approval     -->
  <!-- chain, hierarchy context, correlation id). Append-only —  -->
  <!-- no update or removal API exists. Events live in the       -->
  <!-- simulated runtime state only. Loads after the Permission  -->
  <!-- Foundation (session identity) and before the Repository   -->
  <!-- Foundation, whose writes record through it.               -->
  <!-- ========================================================= -->
  <script src="js/platform/audit-service.js"></script>

  <!-- ========================================================= -->
  <!-- Repository Foundation (Issue #34)                        -->
  <!-- The single data-access layer between the UI and storage   -->
  <!-- (window.AuditOS.repository): one entity repository per    -->
  <!-- business collection, wrapping the Shared Audit State's    -->
  <!-- deep-clone reads and simulated writes behind the          -->
  <!-- interfaces Release 2 implementations will fill in. Every  -->
  <!-- write records one Platform Audit Service event. Also owns -->
  <!-- routing-slug hierarchy resolution for the Repository-     -->
  <!-- aware router and hierarchical breadcrumb. Loads before    -->
  <!-- the navigation content and every workspace module.        -->
  <!-- ========================================================= -->
  <script src="js/platform/repository.js"></script>

  <!-- ========================================================= -->
  <!-- Workspace Shared Platform (Issue #27)                    -->
  <!-- Harmonized helpers reused by every operational workspace: -->
  <!-- shared constants, DOM builders (section, health strip,    -->
  <!-- audit lineage, footer), relationship/lineage resolution,  -->
  <!-- and the rail Master–Detail selection controller. Holds no -->
  <!-- business logic or status vocabulary of its own — each     -->
  <!-- workspace still owns what it renders, only not how. Loads -->
  <!-- after the presentation system and before every workspace  -->
  <!-- module.                                                    -->
  <!-- ========================================================= -->
  <script src="components/workspace-shared/workspace-shared.js"></script>

  <!-- ========================================================= -->
  <!-- Application Bootstrap                                     -->
  <!-- Starts the Shared Audit State and the router once the     -->
  <!-- shell markup is ready.                                    -->
  <!-- ========================================================= -->
  <script src="js/main.js"></script>

  <!-- ========================================================= -->
  <!-- Breadcrumb Navigation Content                             -->
  <!-- Renders the header breadcrumb and its workspace switcher  -->
  <!-- menu from the registry and follows the current route.     -->
  <!-- Loads after the bootstrap so the router has resolved the  -->
  <!-- initial route first.                                      -->
  <!-- ========================================================= -->
  <script src="components/navigation/navigation.js"></script>

  <!-- ========================================================= -->
  <!-- Global Header Content                                     -->
  <!-- Renders the theme toggle, the notification indicator, and -->
  <!-- the signed-in user control into the header's global       -->
  <!-- actions and profile regions. Business values derive from  -->
  <!-- the Shared Audit State; the theme preference is memory-   -->
  <!-- only presentation state.                                  -->
  <!-- ========================================================= -->
  <script src="components/header/header.js"></script>

  <!-- ========================================================= -->
  <!-- Persistent Platform Footer (Issue #34)                   -->
  <!-- Renders the shell's persistent status footer into the     -->
  <!-- workspace host footer region: environment, session mode,  -->
  <!-- demo-data status, active workspace, and audit event       -->
  <!-- count — every value derived from the platform             -->
  <!-- foundations, never fabricated.                            -->
  <!-- ========================================================= -->
  <script src="components/footer/footer.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Workspace Framework                                -->
  <!-- Renders the Universal Workspace Structure into the active -->
  <!-- workspace host on every route change, so every workspace  -->
  <!-- inherits the same internal skeleton. Loads after the      -->
  <!-- bootstrap so the initial route is resolved first.         -->
  <!-- ========================================================= -->
  <script src="components/workspace-framework/workspace-framework.js"></script>

  <!-- ========================================================= -->
  <!-- Shared Wizard Engine (Issue #34)                         -->
  <!-- One reusable multi-step wizard renderer                   -->
  <!-- (window.AuditOS.wizard) both creation wizards configure   -->
  <!-- declaratively: steps, fields, validation, review, and     -->
  <!-- completion. Presentation and captured input only — what   -->
  <!-- the values become belongs to the wizard workspaces.       -->
  <!-- ========================================================= -->
  <script src="components/wizard/wizard.js"></script>

  <!-- ========================================================= -->
  <!-- AuditOS Home Workspace                                    -->
  <!-- The operating-system landing experience. Collects a       -->
  <!-- declarative view model from the Shared Audit State and    -->
  <!-- assembles the resume, urgent, assigned, pulse, portfolio, -->
  <!-- and signal sections from reusable components into the     -->
  <!-- framework's reserved slots. Loads after the framework so  -->
  <!-- the skeleton exists before Home fills it.                 -->
  <!-- ========================================================= -->
  <script src="js/workspaces/home.js"></script>

  <!-- ========================================================= -->
  <!-- Engagement Workspace (Issue #19)                         -->
  <!-- The operational hub of an assurance engagement — the      -->
  <!-- first production workspace on the shared foundation. It   -->
  <!-- maps the Shared Audit State into the shared Workspace     -->
  <!-- Framework and Enterprise Presentation System: engagement  -->
  <!-- summary, frameworks (array-capable), milestones, team,    -->
  <!-- inspector, navigation, activity, and metadata. Loads      -->
  <!-- after the framework so the skeleton exists before it      -->
  <!-- fills the slots.                                          -->
  <!-- ========================================================= -->
  <script src="js/workspaces/engagement.js"></script>

  <!-- ========================================================= -->
  <!-- Operational Work Queue Workspace (Issue #28)             -->
  <!-- The single cross-workspace queue of work across the       -->
  <!-- entire engagement: it aggregates work items already       -->
  <!-- recorded by Walkthrough, Evidence, Requirements, Controls, -->
  <!-- Testing, Findings, and Documentation, and answers one      -->
  <!-- question — what requires my attention right now. Loads     -->
  <!-- after the framework and the Workspace Shared Platform so   -->
  <!-- the skeleton and harmonized helpers exist before it fills  -->
  <!-- the slots.                                                 -->
  <!-- ========================================================= -->
  <script src="js/workspaces/work-queue.js"></script>

  <!-- ========================================================= -->
  <!-- Walkthrough Workspace (Issue #20)                        -->
  <!-- The knowledge-acquisition workspace where the audit team   -->
  <!-- progressively learns the client's environment: sessions,   -->
  <!-- pending questions, process coverage, the relationship      -->
  <!-- panel, and the timeline, mapped onto the shared Workspace  -->
  <!-- Framework and Enterprise Presentation System. Loads after  -->
  <!-- the framework so the skeleton exists before it fills the   -->
  <!-- slots.                                                     -->
  <!-- ========================================================= -->
  <script src="js/workspaces/walkthrough.js"></script>

  <!-- ========================================================= -->
  <!-- Requirements Workspace (Issue #22)                       -->
  <!-- The operational workspace for the engagement's evolving   -->
  <!-- audit requirements — living audit knowledge. Reads the    -->
  <!-- requirement JSON through the Shared Audit State and maps   -->
  <!-- it onto the shared Workspace Framework and Enterprise      -->
  <!-- Presentation System: the requirement health strip, the    -->
  <!-- requirements queue with three presentation modes over one -->
  <!-- dataset and a host-agnostic Requirement Inspector, the    -->
  <!-- audit lineage, and metadata. Loads after the framework so -->
  <!-- the skeleton exists before it fills the slots.            -->
  <!-- ========================================================= -->
  <script src="js/workspaces/requirements.js"></script>

  <!-- ========================================================= -->
  <!-- Controls Workspace (Issue #23)                           -->
  <!-- The operational workspace for the engagement's evolving   -->
  <!-- control library — living audit knowledge. Reads the       -->
  <!-- control JSON through the Shared Audit State and maps it    -->
  <!-- onto the shared Workspace Framework and Enterprise         -->
  <!-- Presentation System: the control health strip, the        -->
  <!-- control library with three presentation modes over one    -->
  <!-- dataset and a host-agnostic Control Inspector (framework   -->
  <!-- mappings, test-procedure preview, related audit objects,  -->
  <!-- and history), the audit lineage, and metadata. Loads      -->
  <!-- after the framework so the skeleton exists before it      -->
  <!-- fills the slots.                                          -->
  <!-- ========================================================= -->
  <script src="js/workspaces/controls.js"></script>

  <!-- ========================================================= -->
  <!-- Evidence Workspace (Issue #21)                           -->
  <!-- The operational system of record for an engagement — what -->
  <!-- evidence exists, what is outstanding, where it            -->
  <!-- originated, what it satisfies, what depends on it, what   -->
  <!-- approvals are pending, and what may be reused. Reads the  -->
  <!-- evidence JSON through the Shared Audit State and maps it   -->
  <!-- onto the shared Workspace Framework and Enterprise         -->
  <!-- Presentation System: health strip, outstanding queue,     -->
  <!-- library with a host-agnostic inspector, reuse, the audit  -->
  <!-- lineage, and metadata. Loads after the framework so the   -->
  <!-- skeleton exists before it fills the slots.                -->
  <!-- ========================================================= -->
  <script src="js/workspaces/evidence.js"></script>

  <!-- ========================================================= -->
  <!-- Testing Workspace (Issue #24)                            -->
  <!-- The operational workspace where auditors perform and      -->
  <!-- manage assurance testing — the validation of controls     -->
  <!-- using evidence. Reads the testing JSON through the Shared  -->
  <!-- Audit State and maps it onto the shared Workspace          -->
  <!-- Framework and Enterprise Presentation System: the testing  -->
  <!-- health strip, testing progress, the test procedure queue   -->
  <!-- with three presentation modes over one dataset and a       -->
  <!-- host-agnostic Test Inspector, the exceptions, the audit    -->
  <!-- lineage, and metadata. Loads after the framework so the    -->
  <!-- skeleton exists before it fills the slots.                -->
  <!-- ========================================================= -->
  <script src="js/workspaces/testing.js"></script>

  <!-- ========================================================= -->
  <!-- Findings Workspace (Issue #25)                           -->
  <!-- The operational workspace where testing results become    -->
  <!-- audit observations. Reads the findings JSON through the    -->
  <!-- Shared Audit State and maps it onto the shared Workspace   -->
  <!-- Framework and Enterprise Presentation System: the findings -->
  <!-- health strip, the findings queue with four presentation    -->
  <!-- modes over one dataset and a host-agnostic Finding          -->
  <!-- Inspector, the remediation status, the audit lineage, and   -->
  <!-- metadata. Loads after the framework so the skeleton exists  -->
  <!-- before it fills the slots.                                 -->
  <!-- ========================================================= -->
  <script src="js/workspaces/findings.js"></script>

  <!-- ========================================================= -->
  <!-- Documentation Workspace (Issue #26)                      -->
  <!-- The continuously evolving engagement documentation —      -->
  <!-- living knowledge fed by every upstream workspace, not      -->
  <!-- generated at the end. Reads the reports JSON (the         -->
  <!-- engagement's continuously assembled document) through the -->
  <!-- Shared Audit State and maps it onto the shared Workspace   -->
  <!-- Framework and Enterprise Presentation System: the          -->
  <!-- documentation health strip, the Document Navigator with a  -->
  <!-- host-agnostic Documentation Inspector, the change summary, -->
  <!-- the audit lineage, and metadata. Loads after the framework -->
  <!-- so the skeleton exists before it fills the slots.          -->
  <!-- ========================================================= -->
  <script src="js/workspaces/documentation.js"></script>

  <!-- ========================================================= -->
  <!-- Audit Program Workspace (Issue #32)                       -->
  <!-- Cross-engagement program overview: participating           -->
  <!-- engagements, shared controls/requirements, evidence reuse  -->
  <!-- across engagements, the audit timeline, coverage, and      -->
  <!-- program health — every value derived from the existing     -->
  <!-- production JSON, reusing the Workspace Shared Platform     -->
  <!-- (Issue #27), the Relationship Engine (Issue #30), and      -->
  <!-- Cross-Workspace Navigation (Issue #31). Loads after the    -->
  <!-- framework so the skeleton exists before it fills the       -->
  <!-- slots.                                                     -->
  <!-- ========================================================= -->
  <script src="js/workspaces/program.js"></script>

  <!-- ========================================================= -->
  <!-- Client Dashboard Workspace (Issue #33)                   -->
  <!-- The client level of the permanent platform hierarchy      -->
  <!-- (AuditOS → Client → Program → Engagement): the at-a-      -->
  <!-- glance operational overview of one client's portfolio —   -->
  <!-- active engagements, milestones, portfolio health,         -->
  <!-- delivery progress, findings, readiness, team workload,    -->
  <!-- and approvals — every value derived live from the         -->
  <!-- operational (non-completed) engagements. Completed        -->
  <!-- engagements stay visible read-only and contribute to no   -->
  <!-- operational metric. Loads after the framework so the      -->
  <!-- skeleton exists before it fills the slots.                -->
  <!-- ========================================================= -->
  <script src="js/workspaces/client-dashboard.js"></script>

  <!-- ========================================================= -->
  <!-- Global Approvals Workspace (Issue #33)                   -->
  <!-- The one approval inbox of the entire platform: every      -->
  <!-- evidence item and request awaiting an audit-team decision -->
  <!-- across every client and operational engagement, each row  -->
  <!-- deep-linking to its record (Issue #31). Decision actions  -->
  <!-- are permission-aware (§5): hidden behind the shared       -->
  <!-- Permission Notice, never disabled controls. Loads after   -->
  <!-- the framework so the skeleton exists before it fills the  -->
  <!-- slots.                                                    -->
  <!-- ========================================================= -->
  <script src="js/workspaces/global-approvals.js"></script>

  <!-- ========================================================= -->
  <!-- AI Usage Workspace (Issue #33)                           -->
  <!-- The administrator-only platform surface for AI            -->
  <!-- operational telemetry and spend accounting. Architectural -->
  <!-- in Release 1: reserved overview instruments, reserved     -->
  <!-- client / engagement / operation breakdowns, and the       -->
  <!-- declared attribution contract — no AI integration, no     -->
  <!-- fabricated figures. Visibility is gated by the Permission -->
  <!-- Foundation. Loads after the framework so the skeleton     -->
  <!-- exists before it fills the slots.                         -->
  <!-- ========================================================= -->
  <script src="js/workspaces/ai-usage.js"></script>

  <!-- ========================================================= -->
  <!-- Global Audit Log Workspace (Issue #34)                   -->
  <!-- The platform-wide immutable audit trail surface:          -->
  <!-- every recorded Platform Audit Service event with its      -->
  <!-- complete schema, searchable and inspectable. Gated by     -->
  <!-- the Permission Foundation (audit-log.view).               -->
  <!-- ========================================================= -->
  <script src="js/workspaces/audit-log.js"></script>

  <!-- ========================================================= -->
  <!-- Client Creation Wizard (Issue #34)                       -->
  <!-- Multi-step, Repository-backed client onboarding:          -->
  <!-- details, business information, services, technology,      -->
  <!-- contacts, user access, programs, review. Capability-      -->
  <!-- gated; simulated persistence.                             -->
  <!-- ========================================================= -->
  <script src="js/workspaces/client-wizard.js"></script>

  <!-- ========================================================= -->
  <!-- Engagement Creation Wizard (Issue #34)                   -->
  <!-- Multi-step, Repository-backed engagement scoping — the    -->
  <!-- future entry point for AI-assisted scoping. Capability-   -->
  <!-- gated; simulated persistence.                             -->
  <!-- ========================================================= -->
  <script src="js/workspaces/engagement-wizard.js"></script>
</body>
</html>
